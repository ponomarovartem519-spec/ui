<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<div class="app-container">
    <div id="start-screen" class="screen">
    <h1>Це тест на знання шахів.</h1>
    <for id="name-form">
    <input type="text" id="name-input" placeholder="Введи своє ім'я">
    </for>
    <button id="start-btn">Почати</button>
    </div>
    <div id="quiz-screen" class="screen hide">
        <div class="header">
    <span id="timer">Час: 15</span>
    <span id="score-display">Бали: 0</span>
    </div>
        <h2 id="question-text">Питання</h2>
        <div id="answers-container">
        </div>
    </div>
    <div id="result-screen" class="screen hide">
    <h2> Квіз завершений!!!!!!!!!</h2>
    <p id="result-text"></p> 
    <button id="restart-btn">Спробувати ще</button>
    </div>
</div>
<link rel="stylesheet" href="style.css">
<script src="index.js"></script>
</body>
</html>
